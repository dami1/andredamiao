<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

<script>
// ── WEBGL: permanent distortion shader ─────────────────
(function(){
  const IMAGES = [
    'imagens/imagemweb2.jpg','imagens/narva2_perf.jpg',
    'imagens/NarvaparaImpressao.jpg','imagens/DTS4699mam-foto-WEB.JPG',
    'imagens/cloro1.jpg','imagens/contraquem3.jpg'
  ];
  const bgImg = document.getElementById('bg-img');
  bgImg.src   = IMAGES[Math.floor(Math.random()*IMAGES.length)];

  const wrap    = document.getElementById('csOuter');
  const glCnv   = document.getElementById('gl-canvas');
  const lensCnv = document.getElementById('lens-canvas');
  let W, H;

  function resize(){
    W = wrap.offsetWidth; H = wrap.offsetHeight;
    glCnv.width=W; glCnv.height=H;
    lensCnv.width=W; lensCnv.height=H;
  }
  resize();
  window.addEventListener('resize',function(){ resize(); if(ready) rebuildAll(); });
  window.addEventListener('orientationchange',function(){
    setTimeout(function(){ resize(); if(ready) rebuildAll(); },200);
  });

  const gl = glCnv.getContext('webgl',{alpha:true,premultipliedAlpha:false,antialias:false})
          || glCnv.getContext('experimental-webgl',{alpha:true,premultipliedAlpha:false});
  if(!gl){ console.error('no webgl'); return; }

  // ── Shaders ──────────────────────────────────────────────
  // Simple: just draw points at positions stored in buffer.
  // All distortion is done in JS — positions are permanently updated.
  const VERT = `
precision mediump float;
attribute vec2  aPos;     // current (possibly displaced) position
attribute float aPhase;   // for gentle ambient wave
attribute float aScroll;
attribute float aBright;
attribute float aType;
uniform vec2  uRes;
uniform float uTime;
varying float vBright;
varying float vAlpha;

float waveVal(float type,float t,float scroll,float freq,float phase,float amp){
  float x=mod(t*freq+scroll,1.0), a=x*6.2832+phase;
  if(type<1.0) return amp*sin(a);
  if(type<2.0) return amp*clamp(sin(a)*4.0,-1.,1.);
  if(type<3.0){float s=2.0*mod(x,1.0)-1.0;return amp*(s*0.7+sin(a*0.5)*0.3);}
  if(type<4.0){return amp*(sin(x*31.7+phase)*0.5+sin(x*17.3+phase*1.3)*0.3+sin(x*53.1+phase*0.7)*0.2);}
  float p=mod(x+1.0,1.0);return amp*exp(-p*12.0)*sin(p*40.0+phase);
}

void main(){
  float scroll = mod(aScroll+uTime*0.002,1.0);
  float t      = aPos.x/uRes.x;
  float freq   = 0.6+t*3.5;
  // Gentle ambient oscillation — always present, small
  float wy = waveVal(aType,t,scroll,freq,aPhase,1.8);
  float wx = waveVal(mod(aType+2.0,5.0),1.0-t,scroll*0.7,0.4+(1.0-t)*2.8,aPhase+1.57,0.6);
  vec2 p   = aPos + vec2(wx,-wy);
  vec2 clip= (p/uRes)*2.0-1.0; clip.y=-clip.y;
  gl_Position  = vec4(clip,0.0,1.0);
  gl_PointSize = 2.0;
  vBright = aBright;
  vAlpha  = 0.88;
}`;

  const FRAG = `
precision mediump float;
varying float vBright; varying float vAlpha;
void main(){
  vec2 c=gl_PointCoord-0.5; if(dot(c,c)>0.25) discard;
  gl_FragColor=vec4(vec3(vBright),vAlpha);
}`;

  function mkShader(type,src){
    const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog=gl.createProgram();
  gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FRAG));
  gl.linkProgram(prog);

  const aPos=gl.getAttribLocation(prog,'aPos');
  const aType=gl.getAttribLocation(prog,'aType');
  const aPhase=gl.getAttribLocation(prog,'aPhase');
  const aScroll=gl.getAttribLocation(prog,'aScroll');
  const aBright=gl.getAttribLocation(prog,'aBright');
  const uRes=gl.getUniformLocation(prog,'uRes');
  const uTime=gl.getUniformLocation(prog,'uTime');

  const GRAIN=2, STRIDE=6; // px,py,type,phase,scroll,bright
  let grainData=null, nPts=0, buf=null;
  let origX=null, origY=null; // original positions for lens source
  let ready=false;

  function buildGrains(img){
    const tmp=document.createElement('canvas');
    tmp.width=W; tmp.height=H;
    const ctx=tmp.getContext('2d',{willReadFrequently:true});
    const iw=img.naturalWidth,ih=img.naturalHeight;
    const sc=Math.max(W/iw,H/ih);
    const dw=iw*sc,dh=ih*sc,dx=(W-dw)/2,dy=(H-dh)/2;
    ctx.filter='grayscale(100%) contrast(2.4) brightness(0.75)';
    ctx.drawImage(img,dx,dy,dw,dh); ctx.filter='none';
    const pix=ctx.getImageData(0,0,W,H).data;

    const cols=Math.floor(W/GRAIN), rows=Math.floor(H/GRAIN);
    nPts=rows*cols;
    grainData=new Float32Array(nPts*STRIDE);
    origX=new Float32Array(nPts);
    origY=new Float32Array(nPts);

    let k=0,si=0;
    for(let j=0;j<rows;j++){
      for(let i=0;i<cols;i++){
        const px=i*GRAIN, py=j*GRAIN;
        const idx=(py*W+px)*4;
        const bv=(0.299*pix[idx]+0.587*pix[idx+1]+0.114*pix[idx+2])/255;
        grainData[k]  =px; grainData[k+1]=py;
        grainData[k+2]=si%5;
        grainData[k+3]=Math.random()*6.28;
        grainData[k+4]=Math.random();
        grainData[k+5]=Math.pow(bv,0.7);
        origX[si]=px; origY[si]=py;
        k+=STRIDE; si++;
      }
    }
    if(buf) gl.deleteBuffer(buf);
    buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,grainData,gl.DYNAMIC_DRAW); // DYNAMIC for updates
    ready=true;
  }

  // ── PERMANENT DISTORTION ─────────────────────────────────
  // Every frame when hovering, nudge nearby grain positions permanently.
  // Uses a simple radial displacement + wave offset baked into position.
  const RX=0.35, RY=0.35; // fraction of W/H
  let dirtyMin=0, dirtyMax=0; // track which indices changed for subData upload

  function applyDistortion(mxPx, myPx, strength){
    const rx=W*RX, ry=H*RY;
    const MAX_NUDGE=3.5*strength; // px permanently displaced per frame
    dirtyMin=nPts; dirtyMax=-1;

    for(let si=0;si<nPts;si++){
      const k=si*STRIDE;
      const gx=grainData[k], gy=grainData[k+1];
      const dx=gx-mxPx, dy=gy-myPx;
      const distX=Math.abs(dx)/rx, distY=Math.abs(dy)/ry;
      if(distX>1||distY>1) continue;
      const inf=(1-distX)*(1-distY);
      if(inf<0.01) continue;

      // Wave type for this grain row
      const type=grainData[k+2];
      const t=origX[si]/W;
      const freq=0.6+t*3.5;
      const phase=grainData[k+3];

      // Compute wave displacement direction
      const angle=Math.atan2(dy,dx);
      const nudge=inf*MAX_NUDGE;
      // Push grain away from mouse + add perpendicular wave component
      grainData[k]   += Math.cos(angle+Math.PI)*nudge + Math.sin(angle)*nudge*0.4;
      grainData[k+1] += Math.sin(angle+Math.PI)*nudge + Math.cos(angle)*nudge*0.4;

      if(si<dirtyMin) dirtyMin=si;
      if(si>dirtyMax) dirtyMax=si;
    }

    // Upload only changed portion
    if(dirtyMax>=dirtyMin){
      gl.bindBuffer(gl.ARRAY_BUFFER,buf);
      const byteOffset=dirtyMin*STRIDE*4;
      const subArr=grainData.subarray(dirtyMin*STRIDE,(dirtyMax+1)*STRIDE);
      gl.bufferSubData(gl.ARRAY_BUFFER,byteOffset,subArr);
    }
  }

  function setAttribs(){
    const ST=STRIDE*4;
    gl.enableVertexAttribArray(aPos);    gl.vertexAttribPointer(aPos,   2,gl.FLOAT,false,ST,0);
    gl.enableVertexAttribArray(aType);   gl.vertexAttribPointer(aType,  1,gl.FLOAT,false,ST,8);
    gl.enableVertexAttribArray(aPhase);  gl.vertexAttribPointer(aPhase, 1,gl.FLOAT,false,ST,12);
    gl.enableVertexAttribArray(aScroll); gl.vertexAttribPointer(aScroll,1,gl.FLOAT,false,ST,16);
    gl.enableVertexAttribArray(aBright); gl.vertexAttribPointer(aBright,1,gl.FLOAT,false,ST,20);
  }

  function rebuildAll(){ buildGrains(bgImg); prepLens(); }
  bgImg.addEventListener('load',rebuildAll);
  if(bgImg.complete&&bgImg.naturalWidth>0) rebuildAll();

  // ── Render ───────────────────────────────────────────────
  let hover=false, mxPx=0, myPx=0, warpStrength=0, warpTarget=0, frame=0;
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  function render(){
    requestAnimationFrame(render);
    if(!ready) return;
    frame++;

    // Smooth warp strength
    warpStrength+=(warpTarget-warpStrength)*0.12;

    // Apply permanent distortion when hovering
    if(hover && warpStrength>0.05) applyDistortion(mxPx,myPx,warpStrength);

    gl.viewport(0,0,W,H);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER,buf); setAttribs();
    gl.uniform2f(uRes,W,H);
    gl.uniform1f(uTime,frame);
    gl.drawArrays(gl.POINTS,0,nPts);
  }
  render();

  // ── Lens (2D canvas) ─────────────────────────────────────
  const lctx=lensCnv.getContext('2d',{willReadFrequently:true});
  const lsrc=document.createElement('canvas');
  let srcReady=false;
  const LR=90, LSTR=0.85;
  let lmx=W/2,lmy=H/2,lstr=0,lstrT=0,lf=0;

  function prepLens(){
    lsrc.width=W; lsrc.height=H;
    const sctx=lsrc.getContext('2d',{willReadFrequently:true});
    const iw=bgImg.naturalWidth,ih=bgImg.naturalHeight;
    const sc=Math.max(W/iw,H/ih);
    const dw=iw*sc,dh=ih*sc,dx=(W-dw)/2,dy=(H-dh)/2;
    sctx.filter='grayscale(100%) contrast(2.4) brightness(0.75)';
    sctx.drawImage(bgImg,dx,dy,dw,dh); sctx.filter='none';
    srcReady=true;
  }
  bgImg.addEventListener('load',prepLens);
  if(bgImg.complete&&bgImg.naturalWidth>0) prepLens();

  function lensRender(){
    lstr+=(lstrT-lstr)*0.10; lf++;
    if(!srcReady||lf%2!==0){requestAnimationFrame(lensRender);return;}
    const r=LR*lstr;
    lctx.clearRect(0,0,W,H);
    if(lstr<0.02){requestAnimationFrame(lensRender);return;}
    const sctx=lsrc.getContext('2d',{willReadFrequently:true});
    const mg=Math.ceil(r*0.4);
    const x0=Math.max(0,Math.floor(lmx-r-mg)),y0=Math.max(0,Math.floor(lmy-r-mg));
    const x1=Math.min(W,Math.ceil(lmx+r+mg)), y1=Math.min(H,Math.ceil(lmy+r+mg));
    const sd=sctx.getImageData(x0,y0,x1-x0,y1-y0);
    const ox0=Math.max(0,Math.floor(lmx-r)),oy0=Math.max(0,Math.floor(lmy-r));
    const ox1=Math.min(W,Math.ceil(lmx+r)), oy1=Math.min(H,Math.ceil(lmy+r));
    const ow=ox1-ox0,oh=oy1-oy0;
    if(ow<1||oh<1){requestAnimationFrame(lensRender);return;}
    const od=lctx.createImageData(ow,oh);
    for(let oy2=0;oy2<oh;oy2++){
      for(let ox2=0;ox2<ow;ox2++){
        const wx=ox0+ox2-lmx,wy=oy0+oy2-lmy,d=Math.sqrt(wx*wx+wy*wy);
        if(d>r) continue;
        const s=LSTR*lstr*(1-d/r)*(1-d/r),nr=d/r,warp=nr-s*nr*(1-nr);
        const sc2=d>0.5?warp/nr:(1-s);
        const sx=Math.round(lmx+wx*sc2),sy=Math.round(lmy+wy*sc2);
        const csx=Math.max(x0,Math.min(x1-1,sx)),csy=Math.max(y0,Math.min(y1-1,sy));
        const si=((csy-y0)*(x1-x0)+(csx-x0))*4,di=(oy2*ow+ox2)*4;
        if(si>=0&&si+3<sd.data.length){
          od.data[di]=sd.data[si];od.data[di+1]=sd.data[si+1];
          od.data[di+2]=sd.data[si+2];od.data[di+3]=255;
        }
      }
    }
    lctx.save(); lctx.beginPath(); lctx.arc(lmx,lmy,r,0,Math.PI*2); lctx.clip();
    lctx.putImageData(od,ox0,oy0); lctx.restore();
    requestAnimationFrame(lensRender);
  }
  lensRender();

  // ── Pointer events ────────────────────────────────────────
  function onMove(e){
    const rect=wrap.getBoundingClientRect();
    mxPx=(e.clientX-rect.left)/rect.width*W;
    myPx=(e.clientY-rect.top)/rect.height*H;
    lmx=mxPx; lmy=myPx;
    hover=true; warpTarget=1; lstrT=1;
  }
  function onEnd(){ hover=false; warpTarget=0; lstrT=0; }
  wrap.addEventListener('pointermove',onMove);
  wrap.addEventListener('pointerdown',function(e){wrap.setPointerCapture(e.pointerId);onMove(e);});
  wrap.addEventListener('pointerleave',onEnd);
  wrap.addEventListener('pointerup',function(e){if(e.pointerType==='touch')onEnd();});
  wrap.addEventListener('pointercancel',onEnd);
})();
</script>

<script>

// ═══════════════════════════════════════════════════════════
// 1. TITLE GLITCH — p5.glitch renders text as image, glitches
// ═══════════════════════════════════════════════════════════
// title rendered by WebGL shader

function makeSono(id, specs) {
  new p5(function(sk) {
    let W, H, fn = 0;
    let mouseOver = false, mouseXL = 0, mouseYL = 0, rawX = 0, rawY = 0;
    let strands = [];

  function waveVal(type, t, scroll, freq, phase, amp, noise) {
    const x = (t * freq + scroll) % 1;
    const a = x * Math.PI * 2 + phase;
    switch(type) {
      case 0: return amp * Math.sin(a);
      case 1: return amp * Math.max(-1, Math.min(1, Math.sin(a) * 3.5));
      case 2: return amp * (2 * (x % 1) - 1);
      case 3: {
        if (!noise) return 0;
        const pos = ((x + 1) % 1) * (noise.length - 1);
        const i0  = Math.floor(pos) % noise.length;
        const i1  = (i0 + 1) % noise.length;
        return amp * (noise[i0] * (1-(pos%1)) + noise[i1] * (pos%1));
      }
      case 4: {
        const p = ((x%1)+1)%1;
        return amp * (p < 0.08 ? 1 : p < 0.16 ? -0.3 : 0);
      }
    }
    return 0;
  }

  function makeNoise(npts) {
    const freqs  = [1.3, 2.7, 5.1, 8.9];
    const phases = freqs.map(() => Math.random() * Math.PI * 2);
    const amps   = [0.45, 0.28, 0.17, 0.10];
    const arr = [];
    for (let k = 0; k <= npts; k++) {
      const t = k / npts;
      let v = 0;
      freqs.forEach((f, i) => { v += amps[i] * Math.sin(t * Math.PI * 2 * f + phases[i]); });
      arr.push(v);
    }
    return arr;
  }

    sk.setup = function() {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      // Use actual layout width — fallback if not yet painted
      W = wrap.getBoundingClientRect().width || wrap.offsetWidth || 828;
      H = wrap.offsetHeight || 50;
      if (W < 10) W = window.innerWidth - 72 || 828; // mobile fallback
      const cnv = sk.createCanvas(W, H);
      cnv.parent(id);
      sk.pixelDensity(1);
      sk.frameRate(12);

      const DOT = 2, GAP = 1, STEP = DOT + GAP;

      strands = specs.map(function(s, i) {
        const x0px = Math.round(s.x0 * W);
        const x1px = Math.round(s.x1 * W);
        const yPx  = Math.round(s.y  * H);
        const hPx  = Math.max(DOT, Math.round(s.h * H));
        const type  = i % 5;
        const span  = x1px - x0px || 1;
        const len   = s.x1 - s.x0;
        const base  = 0.35 + (1-len)*1.4 + (1-s.h)*0.5;
        const freq  = 0.7 + len * 3.0;
        const noise = (type===3) ? makeNoise(120) : null;

        const dots = [];
        for (let x = x0px; x <= x1px - DOT; x += STEP) {
          dots.push({ ox: x, oy: yPx, t: (x-x0px)/span, amp: 0, ampTarget: 0 });
          if (hPx >= DOT*2+GAP)
            dots.push({ ox: x, oy: yPx+DOT+GAP, t: (x-x0px)/span, amp: 0, ampTarget: 0 });
        }

        return {
          x0: x0px, x1: x1px, y: yPx, span, type, freq,
          phase:  Math.random() * Math.PI * 2,
          scroll: Math.random(),
          speed:  base * (0.6 + Math.random()*0.8) * 0.003, // slower
          noise, a: s.a || 255, dots
        };
      });

      // Unified input — mouse hover + touch continuous tracking
      cnv.elt.style.touchAction = 'none';

      function sonoMove(clientX, clientY) {
        const rect = cnv.elt.getBoundingClientRect();
        rawX = clientX - rect.left;
        rawY = clientY - rect.top;
        mouseOver = true;
      }
      function sonoEnd() {
        mouseOver = false;
        strands.forEach(st => st.dots.forEach(d => { d.ampTarget = 0; }));
      }

      // Mouse: pointermove covers hover (no click needed)
      cnv.elt.addEventListener('pointermove', function(e) {
        sonoMove(e.clientX, e.clientY);
      });
      cnv.elt.addEventListener('pointerleave', sonoEnd);

      // Touch: capture + track continuously
      cnv.elt.addEventListener('pointerdown', function(e) {
        if (e.pointerType === 'touch') {
          cnv.elt.setPointerCapture(e.pointerId);
          sonoMove(e.clientX, e.clientY);
        }
      });
      cnv.elt.addEventListener('pointerup',     function(e) { if (e.pointerType === 'touch') sonoEnd(); });
      cnv.elt.addEventListener('pointercancel', sonoEnd);
    };

    sk.draw = function() {
      fn++;
      sk.background(8);
      sk.noStroke();

      // Lerp mouse position for smoother touch tracking
      mouseXL += (rawX - mouseXL) * 0.18;
      mouseYL += (rawY - mouseYL) * 0.18;

      // Radius of influence in px — narrow, follows mouse closely
      const RADIUS_X = W * 0.12; // ~12% of width
      const RADIUS_Y = H * 1.2;  // generous vertically (small canvas)
      const MAX_AMP  = 10;

      for (const st of strands) {
        st.scroll = (st.scroll + st.speed) % 1;

        // per-dot amplitude driven by 2D proximity to mouse
        const distY = Math.abs(mouseYL - (st.y + 1));
        const infY  = mouseOver ? Math.max(0, 1 - distY / RADIUS_Y) : 0;

        st.dots.forEach(function(dot) {
          if (mouseOver && infY > 0) {
            const distX = Math.abs(mouseXL - dot.ox);
            const infX  = Math.max(0, 1 - distX / RADIUS_X);
            dot.ampTarget = infX * infY * MAX_AMP;
          } else {
            dot.ampTarget = 0;
          }
          dot.amp += (dot.ampTarget - dot.amp) * 0.12;
        });

        sk.fill(240, 237, 230, st.a);
        const DOT = 2;
        for (const dot of st.dots) {
          const scrollPx = st.scroll * st.span;
          const wrappedX = st.x0 + ((dot.ox + scrollPx - st.x0) % st.span + st.span) % st.span;
          if (dot.amp < 0.05) {
            sk.rect(wrappedX, dot.oy, DOT, DOT);
          } else {
            const dy = waveVal(st.type, dot.t, st.scroll, st.freq, st.phase, dot.amp, st.noise);
            sk.rect(wrappedX, dot.oy - dy, DOT, DOT);
          }
        }
      }

    };

    sk.windowResized = function() {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      W = wrap.offsetWidth;
      sk.resizeCanvas(W, H);
    };
  });
}

</script>

<script>
// ── TITLE WebGL SHADER ───────────────────────────────────
(function(){
  const nameEl  = document.getElementById('sname');
  const header  = document.getElementById('siteHeader');
  const glCnv   = document.getElementById('title-gl-canvas');

  let W, H, fs;

  function resize(){
    W  = header.offsetWidth;
    fs = Math.min(72, Math.max(20, W * 0.07));
    H  = Math.round(fs * 1.4);
    glCnv.width  = W;
    glCnv.height = H;
    glCnv.style.width  = W  + 'px';
    glCnv.style.height = H + 'px';
    nameEl.style.visibility = 'hidden';
  }
  resize();
  window.addEventListener('resize', function(){ resize(); buildTitleGrains(); });

  const gl = glCnv.getContext('webgl',{alpha:true,premultipliedAlpha:false,antialias:false})
          || glCnv.getContext('experimental-webgl',{alpha:true,premultipliedAlpha:false});
  if(!gl) return;

  const VERT = `
precision mediump float;
attribute vec2  aPos;
attribute float aType;
attribute float aPhase;
attribute float aScroll;
attribute float aBright;
uniform vec2  uRes;
uniform vec2  uMouse;
uniform float uWarp;
uniform float uTime;
uniform vec2  uTrailPos[48];
uniform float uTrailAge[48];
varying float vBright;
varying float vAlpha;


float waveVal(float type,float t,float scroll,float freq,float phase,float amp){
  float x=mod(t*freq+scroll,1.0), a=x*6.2832+phase;
  if(type<1.0) return amp*sin(a);
  if(type<2.0) return amp*clamp(sin(a)*4.0,-1.,1.);
  if(type<3.0){ float s=2.0*mod(x,1.0)-1.0; return amp*(s*0.7+sin(a*0.5)*0.3); }
  if(type<4.0){ return amp*(sin(x*31.7+phase)*0.5+sin(x*17.3+phase*1.3)*0.3+sin(x*53.1+phase*0.7)*0.2); }
  float p=mod(x+1.0,1.0); return amp*exp(-p*12.0)*sin(p*40.0+phase);
}

void main(){
  float scroll=mod(aScroll+uTime*0.002,1.0);
  float t=aPos.x/uRes.x, freq=0.6+t*3.5;

  vec2  delta=aPos-uMouse;
  float dist=length(delta*vec2(1.0,uRes.x/uRes.y));
  float radius=uRes.x*(0.07+0.13*uWarp);
  float inf=clamp(1.0-dist/radius,0.0,1.0);
  inf=inf*inf*(3.0-2.0*inf); inf=inf*inf;

  float trailInf=0.0; vec2 trailDir=vec2(0.0);
  for(int i=0;i<48;i++){
    vec2 td=aPos-uTrailPos[i];
    float td2=length(td*vec2(1.0,uRes.x/uRes.y));
    float age=uTrailAge[i];
    float tr=uRes.x*(0.04+0.08*(1.0-age));
    float ti=clamp(1.0-td2/max(tr,0.001),0.0,1.0);
    ti=ti*ti;
    float ds=2.0; // constant strong distortion
    trailInf+=ti*ds;
    if(td2<tr) trailDir+=normalize(td+vec2(0.001))*ti*ds;
  }
  trailInf=clamp(trailInf,0.0,3.0);

  float amp=1.5+65.0*inf*uWarp+trailInf*8.0;
  float wy=waveVal(aType,t,scroll,freq,aPhase,amp);
  float wx=waveVal(mod(aType+2.0,5.0),1.0-t,scroll*0.7+0.3,0.4+(1.0-t)*2.8,aPhase+1.57,amp*0.35);
  float lensR=uRes.x*0.09*uWarp;
  float lensInf=clamp(1.0-dist/max(lensR,0.001),0.0,1.0); lensInf=lensInf*lensInf;
  vec2 lensShift=-delta*lensInf*0.25*uWarp;
  vec2 trailShift=normalize(trailDir+vec2(0.001))*trailInf*4.0;

  float tiltX=sign(delta.y)*inf*12.0*uWarp;
  float tiltY=sign(delta.x)*inf*8.0*uWarp;
  vec2 p=aPos+vec2(wx+tiltX,-wy+tiltY)+lensShift+trailShift;
  vec2 clip=(p/uRes)*2.0-1.0; clip.y=-clip.y;
  gl_Position=vec4(clip,0.0,1.0);
  gl_PointSize=2.0;
  vBright=aBright; vAlpha=0.88+clamp(trailInf*0.1,0.0,0.12);
}`;

  const FRAG=`
precision mediump float;
varying float vBright; varying float vAlpha;
void main(){
  vec2 c=gl_PointCoord-0.5; if(dot(c,c)>0.25) discard;
  gl_FragColor=vec4(vec3(vBright),vAlpha);
}`;

  function mkS(type,src){
    const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error('title shader:',gl.getShaderInfoLog(s));
    return s;
  }
  const prog=gl.createProgram();
  gl.attachShader(prog,mkS(gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,FRAG));
  gl.linkProgram(prog);

  const aPos=gl.getAttribLocation(prog,'aPos'), aType=gl.getAttribLocation(prog,'aType');
  const aPhase=gl.getAttribLocation(prog,'aPhase'), aScroll=gl.getAttribLocation(prog,'aScroll');
  const aBright=gl.getAttribLocation(prog,'aBright');
  const uRes=gl.getUniformLocation(prog,'uRes'), uMouse=gl.getUniformLocation(prog,'uMouse');
  const uWarp=gl.getUniformLocation(prog,'uWarp'), uTime=gl.getUniformLocation(prog,'uTime');
  const uTrailPos=gl.getUniformLocation(prog,'uTrailPos[0]');
  const uTrailAge=gl.getUniformLocation(prog,'uTrailAge[0]');

  let buf=null, nPts=0;

  function buildTitleGrains(){
    const tmp=document.createElement('canvas');
    tmp.width=W; tmp.height=H;
    const ctx=tmp.getContext('2d',{willReadFrequently:true});
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font=`200 ${fs}px 'Barlow Condensed',Arial Narrow,sans-serif`;
    ctx.textBaseline='alphabetic';
    ctx.fillText('ANDRÉ DAMIÃO', 0, fs*0.88);
    const pix=ctx.getImageData(0,0,W,H).data;
    const pts=[], TG=2, si=0;
    for(let j=0;j<H;j+=TG){
      for(let i=0;i<W;i+=TG){
        const idx=(j*W+i)*4;
        if(pix[idx]>60){
          pts.push(i,j, (pts.length/6)%5, Math.random()*6.28, Math.random(), 0.94);
        }
      }
    }
    nPts=pts.length/6;
    if(nPts===0) return;
    if(buf) gl.deleteBuffer(buf);
    buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pts),gl.STATIC_DRAW);
  }
  buildTitleGrains();

  // Share trail from main canvas
  const TRAIL_LEN=48;
  const tX=new Float32Array(TRAIL_LEN), tY=new Float32Array(TRAIL_LEN);
  const tAge=new Float32Array(TRAIL_LEN).fill(1.0); // start aged out
  let tHead=0;
  window._titleTrail={push:function(x,y){
    tX[tHead]=x; tY[tHead]=y; tAge[tHead]=0.0;
    tHead=(tHead+1)%TRAIL_LEN;
  }};

  let mx=W/2,my=H/2,warpAmt=0,warpTarget=0,frame=0;
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  function render(){
    requestAnimationFrame(render);
    if(!buf) return;
    frame++;
    // Trail age frozen — permanent distortion
    // tAge stays at 0 = maximum distortion forever
    if(warpTarget<0.01) warpAmt=Math.max(0.3, warpAmt*0.998); else warpAmt+=(warpTarget-warpAmt)*0.10;

    gl.viewport(0,0,W,H);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);

    const tf=new Float32Array(TRAIL_LEN*2);
    for(let i=0;i<TRAIL_LEN;i++){tf[i*2]=tX[i];tf[i*2+1]=tY[i];}
    gl.uniform2fv(uTrailPos,tf); gl.uniform1fv(uTrailAge,tAge);
    gl.uniform2f(uRes,W,H); gl.uniform2f(uMouse,mx,my);
    gl.uniform1f(uWarp,warpAmt); gl.uniform1f(uTime,frame);

    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    const ST=6*4;
    gl.enableVertexAttribArray(aPos);    gl.vertexAttribPointer(aPos,   2,gl.FLOAT,false,ST,0);
    gl.enableVertexAttribArray(aType);   gl.vertexAttribPointer(aType,  1,gl.FLOAT,false,ST,8);
    gl.enableVertexAttribArray(aPhase);  gl.vertexAttribPointer(aPhase, 1,gl.FLOAT,false,ST,12);
    gl.enableVertexAttribArray(aScroll); gl.vertexAttribPointer(aScroll,1,gl.FLOAT,false,ST,16);
    gl.enableVertexAttribArray(aBright); gl.vertexAttribPointer(aBright,1,gl.FLOAT,false,ST,20);
    gl.drawArrays(gl.POINTS,0,nPts);
  }
  render();

  // Pointer events on header
  header.style.touchAction='none';
  function onMove(e){
    const r=header.getBoundingClientRect();
    mx=(e.clientX-r.left); my=(e.clientY-r.top);
    warpTarget=1;
    if(window._titleTrail) window._titleTrail.push(mx,my);
  }
  header.addEventListener('pointermove',onMove);
  header.addEventListener('pointerdown',function(e){header.setPointerCapture(e.pointerId);onMove(e);});
  header.addEventListener('pointerleave',function(){warpTarget=0;});
  header.addEventListener('pointerup',function(e){if(e.pointerType==='touch')warpTarget=0;});
})();
</script>
