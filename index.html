<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

<script>
// ── RANDOM IMAGE + WEBGL DOT MESH ───────────────────────
(function(){
  const IMAGES = [
    'imagens/imagemweb2.jpg',
    'imagens/narva2_perf.jpg',
    'imagens/NarvaparaImpressao.jpg',
    'imagens/DTS4699mam-foto-WEB.JPG',
    'imagens/cloro1.jpg',
    'imagens/contraquem3.jpg'
  ];

  // Pick a random image on each page load
  const chosen = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  const bgImg  = document.getElementById('bg-img');
  bgImg.src    = chosen;

  const wrap   = document.getElementById('csOuter');
  const glCnv  = document.getElementById('gl-canvas');
  const lensCnv= document.getElementById('lens-canvas');
  let W, H;

  function resize(){
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    glCnv.width  = W; glCnv.height  = H;
    lensCnv.width= W; lensCnv.height= H;
  }
  resize();
  window.addEventListener('resize', function(){ resize(); rebuildGL(); });

  // ── WebGL shader ─────────────────────────────────────────
  const gl = glCnv.getContext('webgl',{alpha:true,premultipliedAlpha:false});
  if(!gl){ console.error('no webgl'); return; }

  const VERT = `
precision mediump float;
attribute vec2  aPos;      // grain position in pixels (0..W, 0..H)
attribute float aType;     // wave type 0-4
attribute float aPhase;    // random phase
attribute float aScroll;   // random scroll offset
attribute float aBright;   // 0-1 luminance

uniform vec2  uRes;        // canvas size
uniform vec2  uMouse;      // mouse in pixels
uniform float uWarp;       // 0-1
uniform float uTime;

varying float vBright;
varying float vAlpha;

// Hash for noise
float hash(float n){ return fract(sin(n)*43758.5453); }

// 5 wave types — varied and distinct
float waveVal(float type, float t, float scroll, float freq,
              float phase, float amp) {
  float x = mod(t * freq + scroll, 1.0);
  float a = x * 6.2832 + phase;
  if (type < 1.0) return amp * sin(a);
  // Clipped sine → square-ish
  if (type < 2.0) return amp * clamp(sin(a)*4.0,-1.,1.);
  // Sawtooth with soft knee
  if (type < 3.0) {
    float saw = 2.0*mod(x,1.0)-1.0;
    return amp * (saw * 0.7 + sin(a*0.5)*0.3);
  }
  // Multi-partial noise — sum of inharmonic sines
  if (type < 4.0) {
    float n = sin(x*31.7+phase)*0.5
            + sin(x*17.3+phase*1.3)*0.3
            + sin(x*53.1+phase*0.7)*0.2;
    return amp * n;
  }
  // Narrow pulse with ringing
  float p = mod(x+1.0,1.0);
  float ring = exp(-p*12.0)*sin(p*40.0+phase);
  return amp * ring;
}

void main(){
  float scroll = mod(aScroll + uTime * 0.002, 1.0);
  float t      = aPos.x / uRes.x;
  float freq   = 0.6 + t * 3.5;
  float row    = floor(aPos.y / float(3));

  // Distance to mouse
  vec2  delta  = aPos - uMouse;
  // Aspect-correct distance
  // Circular distance, aspect-corrected
  vec2  dAsp   = delta * vec2(1.0, uRes.x/uRes.y);
  float dist   = length(dAsp);
  float radius = uRes.x * (0.08 + 0.18*uWarp);  // much smaller, circular
  float inf    = clamp(1.0 - dist/radius, 0.0, 1.0);
  inf = inf * inf * inf;  // steeper falloff — tight circle

  // Base amp always > 0 — dots always move gently at rest
  float amp  = 1.5 + 65.0 * inf * uWarp;

  // Y displacement — main wave
  float wy = waveVal(aType, t, scroll, freq, aPhase, amp);

  // X displacement — different wave type per row for variety
  float typeX = mod(aType + 2.0, 5.0);
  float freqX = 0.4 + (1.0-t)*2.8;
  float wx = waveVal(typeX, 1.0-t, scroll*0.7+0.3, freqX, aPhase+1.57, amp*0.35);

  // Tilt from mouse direction — both axes
  float tiltX = sign(delta.y) * inf * 12.0 * uWarp;
  float tiltY = sign(delta.x) * inf *  8.0 * uWarp;

  // Convert to clip space (-1..1)
  vec2 p = aPos + vec2(wx + tiltX, -wy + tiltY);
  vec2 clip = (p / uRes) * 2.0 - 1.0;
  clip.y = -clip.y;  // flip Y for WebGL

  gl_Position  = vec4(clip, 0.0, 1.0);
  gl_PointSize = 2.0;

  vBright = aBright;
  vAlpha  = 0.85;
}`;

  const FRAG = `
precision mediump float;
varying float vBright;
varying float vAlpha;
void main(){
  // Circular dot
  vec2 c = gl_PointCoord - 0.5;
  if(dot(c,c) > 0.25) discard;
  gl_FragColor = vec4(vec3(vBright), vAlpha);
}`;

  function mkShader(type,src){
    const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog=gl.createProgram();
  gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VERT));
  gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FRAG));
  gl.linkProgram(prog);

  const aPos=gl.getAttribLocation(prog,'aPos');
  const aType=gl.getAttribLocation(prog,'aType');
  const aPhase=gl.getAttribLocation(prog,'aPhase');
  const aScroll=gl.getAttribLocation(prog,'aScroll');
  const aBright=gl.getAttribLocation(prog,'aBright');
  const uRes=gl.getUniformLocation(prog,'uRes');
  const uMouse=gl.getUniformLocation(prog,'uMouse');
  const uWarp=gl.getUniformLocation(prog,'uWarp');
  const uTime=gl.getUniformLocation(prog,'uTime');

  const GRAIN = 2;
  let buf=null, nPoints=0;

  function buildGrains(img){
    const tmp=document.createElement('canvas');
    tmp.width=W; tmp.height=H;
    const ctx=tmp.getContext('2d');
    ctx.filter='grayscale(100%) contrast(2.0) brightness(0.8)';
    ctx.drawImage(img,0,0,W,H); ctx.filter='none';
    const pix=ctx.getImageData(0,0,W,H).data;
    const cols=Math.floor(W/GRAIN), rows=Math.floor(H/GRAIN);
    nPoints=rows*cols;
    const data=new Float32Array(nPoints*6);
    let k=0,si=0;
    for(let j=0;j<rows;j++){
      for(let i=0;i<cols;i++){
        const px=i*GRAIN, py=j*GRAIN;
        const idx=(py*W+px)*4;
        const bv=(0.299*pix[idx]+0.587*pix[idx+1]+0.114*pix[idx+2])/255;
        data[k++]=px; data[k++]=py;
        data[k++]=si%5;
        data[k++]=Math.random()*6.28;
        data[k++]=Math.random();
        data[k++]=Math.pow(bv,0.7);
        si++;
      }
    }
    if(buf) gl.deleteBuffer(buf);
    buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,data,gl.STATIC_DRAW);
    const ST=6*4;
    gl.enableVertexAttribArray(aPos);   gl.vertexAttribPointer(aPos,  2,gl.FLOAT,false,ST,0);
    gl.enableVertexAttribArray(aType);  gl.vertexAttribPointer(aType, 1,gl.FLOAT,false,ST,8);
    gl.enableVertexAttribArray(aPhase); gl.vertexAttribPointer(aPhase,1,gl.FLOAT,false,ST,12);
    gl.enableVertexAttribArray(aScroll);gl.vertexAttribPointer(aScroll,1,gl.FLOAT,false,ST,16);
    gl.enableVertexAttribArray(aBright);gl.vertexAttribPointer(aBright,1,gl.FLOAT,false,ST,20);
  }

  function rebuildGL(){
    if(bgImg.complete && bgImg.naturalWidth>0) buildGrains(bgImg);
  }
  bgImg.onload = rebuildGL;
  if(bgImg.complete && bgImg.naturalWidth>0) rebuildGL();

  // ── Render loop ───────────────────────────────────────────
  let mx=0, my=0, warpAmt=0, warpTarget=0, frame=0;
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  function renderGL(){
    requestAnimationFrame(renderGL);
    if(!buf) return;
    frame++;
    warpAmt+=(warpTarget-warpAmt)*0.10;
    gl.viewport(0,0,W,H);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    const ST=6*4;
    gl.vertexAttribPointer(aPos,  2,gl.FLOAT,false,ST,0);
    gl.vertexAttribPointer(aType, 1,gl.FLOAT,false,ST,8);
    gl.vertexAttribPointer(aPhase,1,gl.FLOAT,false,ST,12);
    gl.vertexAttribPointer(aScroll,1,gl.FLOAT,false,ST,16);
    gl.vertexAttribPointer(aBright,1,gl.FLOAT,false,ST,20);
    gl.uniform2f(uRes,W,H);
    gl.uniform2f(uMouse,mx,my);
    gl.uniform1f(uWarp,warpAmt);
    gl.uniform1f(uTime,frame);
    gl.drawArrays(gl.POINTS,0,nPoints);
  }
  renderGL();

  // ── Lens fish-eye ─────────────────────────────────────────
  const lctx=lensCnv.getContext('2d');
  const src=document.createElement('canvas');
  let srcReady=false;
  const R=90, STR=0.6;
  let lmx=0,lmy=0,lstr=0,lstrT=0,lf=0;

  function prepLens(){
    src.width=W; src.height=H;
    const sctx=src.getContext('2d');
    sctx.filter='grayscale(100%) contrast(2.0) brightness(0.8)';
    sctx.drawImage(bgImg,0,0,W,H); sctx.filter='none';
    srcReady=true;
  }
  bgImg.addEventListener('load', prepLens);
  if(bgImg.complete&&bgImg.naturalWidth>0) prepLens();

  function lensRender(){
    lstr+=(lstrT-lstr)*0.10; lf++;
    if(!srcReady||lf%2!==0){requestAnimationFrame(lensRender);return;}
    const r=R*lstr;
    lctx.clearRect(0,0,W,H);
    if(lstr<0.02){requestAnimationFrame(lensRender);return;}
    const sctx=src.getContext('2d');
    const mg=Math.ceil(r*0.4);
    const x0=Math.max(0,Math.floor(lmx-r-mg)),y0=Math.max(0,Math.floor(lmy-r-mg));
    const x1=Math.min(W,Math.ceil(lmx+r+mg)), y1=Math.min(H,Math.ceil(lmy+r+mg));
    const sd=sctx.getImageData(x0,y0,x1-x0,y1-y0);
    const ox0=Math.max(0,Math.floor(lmx-r)),oy0=Math.max(0,Math.floor(lmy-r));
    const ox1=Math.min(W,Math.ceil(lmx+r)), oy1=Math.min(H,Math.ceil(lmy+r));
    const ow=ox1-ox0,oh=oy1-oy0;
    if(ow<1||oh<1){requestAnimationFrame(lensRender);return;}
    const od=lctx.createImageData(ow,oh);
    for(let oy=0;oy<oh;oy++){
      for(let ox=0;ox<ow;ox++){
        const wx=ox0+ox-lmx,wy=oy0+oy-lmy,d=Math.sqrt(wx*wx+wy*wy);
        if(d>r) continue;
        const s=STR*lstr*(1-d/r)*(1-d/r),nr=d/r,warp=nr-s*nr*(1-nr);
        const sc=d>0.5?warp/nr:(1-s);
        const sx=Math.round(lmx+wx*sc),sy=Math.round(lmy+wy*sc);
        const csx=Math.max(x0,Math.min(x1-1,sx)),csy=Math.max(y0,Math.min(y1-1,sy));
        const si=((csy-y0)*(x1-x0)+(csx-x0))*4,di=(oy*ow+ox)*4;
        if(si>=0&&si+3<sd.data.length){
          od.data[di]=sd.data[si];od.data[di+1]=sd.data[si+1];
          od.data[di+2]=sd.data[si+2];od.data[di+3]=255;
        }
      }
    }
    lctx.save();
    lctx.beginPath(); lctx.arc(lmx,lmy,r,0,Math.PI*2); lctx.clip();
    lctx.putImageData(od,ox0,oy0);
    lctx.restore();
    requestAnimationFrame(lensRender);
  }
  lensRender();

  // ── Shared pointer events ─────────────────────────────────
  function onMove(e){
    const rect=wrap.getBoundingClientRect();
    mx=(e.clientX-rect.left)/rect.width*W;
    my=(e.clientY-rect.top)/rect.height*H;
    lmx=mx; lmy=my;
    warpTarget=1; lstrT=1;
  }
  function onEnd(e){
    warpTarget=0; lstrT=0;
  }
  wrap.addEventListener('pointermove',onMove);
  wrap.addEventListener('pointerdown',function(e){wrap.setPointerCapture(e.pointerId);onMove(e);});
  wrap.addEventListener('pointerleave',onEnd);
  wrap.addEventListener('pointerup',function(e){if(e.pointerType==='touch')onEnd();});
  wrap.addEventListener('pointercancel',onEnd);
})();
</script>

<script>

// ═══════════════════════════════════════════════════════════
// 1. TITLE GLITCH — p5.glitch renders text as image, glitches
// ═══════════════════════════════════════════════════════════
new p5(function(sk) {
  let W, H, fn = 0;
  let mouseOver = false;
  let mouseXLocal = 0;
  let particles = [], textReady = false;

  function sampleText(W, fs, H) {
    const pg = sk.createGraphics(W, H);
    pg.background(0,0,0,0);
    pg.fill(255); pg.noStroke();
    pg.textFont('Arial Narrow, Arial');
    pg.textStyle(pg.NORMAL);
    pg.textSize(fs);
    pg.text('ANDRÉ DAMIÃO', 0, fs * 0.88);
    pg.loadPixels();
    const pix = pg.pixels, PW = pg.width, PH = pg.height;
    // Adaptive grid: smaller = more dots = better quality
    // On mobile (small W) use tighter grid so title doesn't look broken
    const GRID = 3; // uniform density — smaller dots on mobile instead
    const rows = {};
    for (let y = 0; y < PH; y += GRID) {
      for (let x = 0; x < PW; x += GRID) {
        const i = (y * PW + x) * 4;
        if (pix[i+3] > 60) {
          const ry = Math.floor(y/GRID);
          if (!rows[ry]) rows[ry] = { y, pts: [] };
          rows[ry].pts.push({ ox: x, oy: y });
        }
      }
    }
    pg.remove();
    let si = 0;
    Object.values(rows).forEach(function(row) {
      if (row.pts.length < 2) return;
      const type = si % 5;
      const xMin = row.pts[0].ox;
      const xMax = row.pts[row.pts.length-1].ox;
      const span = xMax - xMin || 1;
      const freq = 0.6 + (span/W) * 3.5;
      particles.push({
        y: row.y, xMin, xMax, span, type, freq,
        phase:  Math.random() * Math.PI * 2,
        scroll: Math.random(),
        speed:  0.0003 + Math.random() * 0.0005,
        noise:  (type===3) ? makeNoise(120) : null,
        dots: row.pts.map(p => ({
          ox: p.ox, oy: p.oy,
          t: (p.ox - xMin) / span,
          amp: 0, ampTarget: 0
        }))
      });
      si++;
    });
    textReady = true;
    sk.loop();
    }

  function waveVal(type, t, scroll, freq, phase, amp, noise) {
    const x = (t * freq + scroll) % 1;
    const a = x * Math.PI * 2 + phase;
    switch(type) {
      case 0: return amp * Math.sin(a);
      case 1: return amp * Math.max(-1, Math.min(1, Math.sin(a) * 3.5));
      case 2: return amp * (2 * (x % 1) - 1);
      case 3: {
        if (!noise) return 0;
        const pos = ((x + 1) % 1) * (noise.length - 1);
        const i0  = Math.floor(pos) % noise.length;
        const i1  = (i0 + 1) % noise.length;
        return amp * (noise[i0] * (1-(pos%1)) + noise[i1] * (pos%1));
      }
      case 4: {
        const p = ((x%1)+1)%1;
        return amp * (p < 0.08 ? 1 : p < 0.16 ? -0.3 : 0);
      }
    }
    return 0;
  }

  function makeNoise(npts) {
    const freqs  = [1.3, 2.7, 5.1, 8.9];
    const phases = freqs.map(() => Math.random() * Math.PI * 2);
    const amps   = [0.45, 0.28, 0.17, 0.10];
    const arr = [];
    for (let k = 0; k <= npts; k++) {
      const t = k / npts;
      let v = 0;
      freqs.forEach((f, i) => { v += amps[i] * Math.sin(t * Math.PI * 2 * f + phases[i]); });
      arr.push(v);
    }
    return arr;
  }

  sk.setup = function() {
    const header = document.getElementById('siteHeader');
    const nameEl = document.getElementById('sname');
    W = header.offsetWidth || 800;
    const fs = Math.min(72, Math.max(20, W * 0.07));
    H = Math.round(fs * 1.4);

    let cnv = sk.createCanvas(W, H);
    cnv.elt.id = 'title-canvas';
    cnv.elt.style.cssText = 'position:absolute;top:18px;left:0;pointer-events:none;z-index:3;';
    header.insertBefore(cnv.elt, header.firstChild);
    nameEl.style.visibility = 'hidden';

    sk.pixelDensity(1);
    sk.frameRate(15);
    sk.noLoop();



    sampleText(W, fs, H);

    // Unified input — mouse hover + touch continuous tracking
    header.style.touchAction = 'none';

    function titleMove(e) {
      mouseOver = true; decompTarget = 1;
      const rect = header.getBoundingClientRect();
      mouseXLocal = e.clientX - rect.left;
      particles.forEach(s => { s.ampTarget = 16 + Math.random() * 8; });
    }
    function titleEnd() {
      mouseOver = false; decompTarget = 0;
      particles.forEach(s => s.dots.forEach(d => { d.ampTarget = 0; }));
    }

    // Mouse hover — no click needed
    header.addEventListener('pointermove', titleMove);
    header.addEventListener('pointerleave', titleEnd);

    // Touch — capture and track continuously
    header.addEventListener('pointerdown', function(e) {
      if (e.pointerType === 'touch') {
        header.setPointerCapture(e.pointerId);
        titleMove(e);
      }
    });
    header.addEventListener('pointerup',     function(e) { if (e.pointerType === 'touch') titleEnd(); });
    header.addEventListener('pointercancel', titleEnd);
  };

  sk.draw = function() {
    if (!textReady) return;
    fn++;
    sk.clear();
    sk.noStroke();

    // Influence radius: dots within ~120px of mouse get full amp
    const RADIUS = W < 600 ? W * 0.25 : 160; // proportional radius
    const MAX_AMP = 16;

    for (const strand of particles) {
      strand.scroll = (strand.scroll + strand.speed) % 1;

      // Update per-dot ampTarget based on distance to mouse X
      strand.dots.forEach(function(dot) {
        if (mouseOver) {
          const dist = Math.abs(dot.ox - mouseXLocal);
          const inf  = Math.max(0, 1 - dist / RADIUS);
          dot.ampTarget = inf * MAX_AMP;
        } else {
          dot.ampTarget = 0;
        }
        // faster spring for snappier response
        dot.amp += (dot.ampTarget - dot.amp) * 0.12;
      });

      sk.fill(240, 237, 230);
      const DOT = W < 600 ? 1.5 : 2; // smaller on mobile so dots don't overlap
      for (const dot of strand.dots) {
        if (dot.amp < 0.05) {
          sk.rect(dot.ox, dot.oy, DOT, DOT);
        } else {
          const dy = waveVal(strand.type, dot.t, strand.scroll, strand.freq, strand.phase, dot.amp, strand.noise);
          sk.rect(dot.ox, dot.oy - dy, DOT, DOT);
        }
      }
      // Push title warp level to global background effect
      let titleMaxWarp = 0;
      for (const strand of particles) {
        for (const dot of strand.dots) {
          if (dot.amp > titleMaxWarp) titleMaxWarp = dot.amp;
        }
      }
      window._sonoWarp = Math.max(window._sonoWarp || 0, Math.min(1, titleMaxWarp / 14));
    }
  };

  sk.windowResized = function() {
    const header = document.getElementById('siteHeader');
    if (!header) return;
    W = header.offsetWidth;
    const newFs = Math.min(72, Math.max(20, W * 0.07));
    const newH  = Math.round(newFs * 1.5);
    sk.resizeCanvas(W, newH);
    // Clear and re-sample at new resolution
    particles  = [];
    textReady  = false;
    mouseOver  = false;
    sampleText(W, newFs, newH);
  };
});

function makeSono(id, specs) {
  new p5(function(sk) {
    let W, H, fn = 0;
    let mouseOver = false, mouseXL = 0, mouseYL = 0, rawX = 0, rawY = 0;
    let strands = [];

  function waveVal(type, t, scroll, freq, phase, amp, noise) {
    const x = (t * freq + scroll) % 1;
    const a = x * Math.PI * 2 + phase;
    switch(type) {
      case 0: return amp * Math.sin(a);
      case 1: return amp * Math.max(-1, Math.min(1, Math.sin(a) * 3.5));
      case 2: return amp * (2 * (x % 1) - 1);
      case 3: {
        if (!noise) return 0;
        const pos = ((x + 1) % 1) * (noise.length - 1);
        const i0  = Math.floor(pos) % noise.length;
        const i1  = (i0 + 1) % noise.length;
        return amp * (noise[i0] * (1-(pos%1)) + noise[i1] * (pos%1));
      }
      case 4: {
        const p = ((x%1)+1)%1;
        return amp * (p < 0.08 ? 1 : p < 0.16 ? -0.3 : 0);
      }
    }
    return 0;
  }

  function makeNoise(npts) {
    const freqs  = [1.3, 2.7, 5.1, 8.9];
    const phases = freqs.map(() => Math.random() * Math.PI * 2);
    const amps   = [0.45, 0.28, 0.17, 0.10];
    const arr = [];
    for (let k = 0; k <= npts; k++) {
      const t = k / npts;
      let v = 0;
      freqs.forEach((f, i) => { v += amps[i] * Math.sin(t * Math.PI * 2 * f + phases[i]); });
      arr.push(v);
    }
    return arr;
  }

    sk.setup = function() {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      // Use actual layout width — fallback if not yet painted
      W = wrap.getBoundingClientRect().width || wrap.offsetWidth || 828;
      H = wrap.offsetHeight || 50;
      if (W < 10) W = window.innerWidth - 72 || 828; // mobile fallback
      const cnv = sk.createCanvas(W, H);
      cnv.parent(id);
      sk.pixelDensity(1);
      sk.frameRate(12);

      const DOT = 2, GAP = 1, STEP = DOT + GAP;

      strands = specs.map(function(s, i) {
        const x0px = Math.round(s.x0 * W);
        const x1px = Math.round(s.x1 * W);
        const yPx  = Math.round(s.y  * H);
        const hPx  = Math.max(DOT, Math.round(s.h * H));
        const type  = i % 5;
        const span  = x1px - x0px || 1;
        const len   = s.x1 - s.x0;
        const base  = 0.35 + (1-len)*1.4 + (1-s.h)*0.5;
        const freq  = 0.7 + len * 3.0;
        const noise = (type===3) ? makeNoise(120) : null;

        const dots = [];
        for (let x = x0px; x <= x1px - DOT; x += STEP) {
          dots.push({ ox: x, oy: yPx, t: (x-x0px)/span, amp: 0, ampTarget: 0 });
          if (hPx >= DOT*2+GAP)
            dots.push({ ox: x, oy: yPx+DOT+GAP, t: (x-x0px)/span, amp: 0, ampTarget: 0 });
        }

        return {
          x0: x0px, x1: x1px, y: yPx, span, type, freq,
          phase:  Math.random() * Math.PI * 2,
          scroll: Math.random(),
          speed:  base * (0.6 + Math.random()*0.8) * 0.003, // slower
          noise, a: s.a || 255, dots
        };
      });

      // Unified input — mouse hover + touch continuous tracking
      cnv.elt.style.touchAction = 'none';

      function sonoMove(clientX, clientY) {
        const rect = cnv.elt.getBoundingClientRect();
        rawX = clientX - rect.left;
        rawY = clientY - rect.top;
        mouseOver = true;
      }
      function sonoEnd() {
        mouseOver = false;
        strands.forEach(st => st.dots.forEach(d => { d.ampTarget = 0; }));
      }

      // Mouse: pointermove covers hover (no click needed)
      cnv.elt.addEventListener('pointermove', function(e) {
        sonoMove(e.clientX, e.clientY);
      });
      cnv.elt.addEventListener('pointerleave', sonoEnd);

      // Touch: capture + track continuously
      cnv.elt.addEventListener('pointerdown', function(e) {
        if (e.pointerType === 'touch') {
          cnv.elt.setPointerCapture(e.pointerId);
          sonoMove(e.clientX, e.clientY);
        }
      });
      cnv.elt.addEventListener('pointerup',     function(e) { if (e.pointerType === 'touch') sonoEnd(); });
      cnv.elt.addEventListener('pointercancel', sonoEnd);
    };

    sk.draw = function() {
      fn++;
      sk.background(8);
      sk.noStroke();

      // Lerp mouse position for smoother touch tracking
      mouseXL += (rawX - mouseXL) * 0.18;
      mouseYL += (rawY - mouseYL) * 0.18;

      // Radius of influence in px — narrow, follows mouse closely
      const RADIUS_X = W * 0.12; // ~12% of width
      const RADIUS_Y = H * 1.2;  // generous vertically (small canvas)
      const MAX_AMP  = 10;

      for (const st of strands) {
        st.scroll = (st.scroll + st.speed) % 1;

        // per-dot amplitude driven by 2D proximity to mouse
        const distY = Math.abs(mouseYL - (st.y + 1));
        const infY  = mouseOver ? Math.max(0, 1 - distY / RADIUS_Y) : 0;

        st.dots.forEach(function(dot) {
          if (mouseOver && infY > 0) {
            const distX = Math.abs(mouseXL - dot.ox);
            const infX  = Math.max(0, 1 - distX / RADIUS_X);
            dot.ampTarget = infX * infY * MAX_AMP;
          } else {
            dot.ampTarget = 0;
          }
          dot.amp += (dot.ampTarget - dot.amp) * 0.12;
        });

        sk.fill(240, 237, 230, st.a);
        const DOT = 2;
        for (const dot of st.dots) {
          const scrollPx = st.scroll * st.span;
          const wrappedX = st.x0 + ((dot.ox + scrollPx - st.x0) % st.span + st.span) % st.span;
          if (dot.amp < 0.05) {
            sk.rect(wrappedX, dot.oy, DOT, DOT);
          } else {
            const dy = waveVal(st.type, dot.t, st.scroll, st.freq, st.phase, dot.amp, st.noise);
            sk.rect(wrappedX, dot.oy - dy, DOT, DOT);
          }
        }
      }
      // Update global warp level for background effect
      let maxWarp = 0;
      for (const st of strands) {
        for (const dot of st.dots) {
          if (dot.amp > maxWarp) maxWarp = dot.amp;
        }
      }
      // Normalise 0-1 and push to global tracker
      const norm = Math.min(1, maxWarp / 10);
      window._sonoWarp = Math.max(window._sonoWarp || 0, norm);
    };

    sk.windowResized = function() {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      W = wrap.offsetWidth;
      sk.resizeCanvas(W, H);
    };
  });
}

<script>
// ── BACKGROUND GRADIENT FROM SONO WARP ──────────────────
(function() {
  window._sonoWarp = 0;
  var currentBg = 0; // 0 = black, 1 = dark grey

  function lerp(a, b, t) { return a + (b - a) * t; }

  var pulsePhase = 0;

  function tick() {
    var target = window._sonoWarp || 0;
    // Fast rise, moderate decay
    currentBg += (target - currentBg) * (target > currentBg ? 0.12 : 0.03);
    // Fast warp decay
    window._sonoWarp = (window._sonoWarp || 0) * 0.92;

    // Pulse: add sine oscillation when active
    pulsePhase += 0.08;
    var pulse = currentBg > 0.05 ? currentBg * 0.35 * Math.abs(Math.sin(pulsePhase)) : 0;
    var total = Math.min(1, currentBg + pulse);

    // Map 0→1 to #080808 → #888888 (much lighter ceiling)
    var v = Math.round(lerp(8, 68, total));
    var hex = v.toString(16).padStart(2,'0');
    document.body.style.backgroundColor = '#' + hex + hex + hex;

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
