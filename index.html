#cursor::after{{
  content:'';

/* Carousel hover — CSS glitch effect, no JS overhead */
.cs-item img.fallback {
  transition: filter 0.8s ease;
}
.cs-item:hover img.fallback,
.cs-item:active img.fallback {
  filter: grayscale(100%) contrast(1.6) brightness(0.85);
  animation: cssglitch 0.15s steps(1) infinite;
}
@keyframes cssglitch {
  0%   { filter: grayscale(100%) contrast(1.6) brightness(0.85) hue-rotate(0deg); transform: translateX(0); }
  25%  { filter: grayscale(100%) contrast(2.0) brightness(1.1);                   transform: translateX(-3px); }
  50%  { filter: grayscale(100%) contrast(1.3) brightness(0.7);                   transform: translateX(2px); }
  75%  { filter: grayscale(100%) contrast(1.8) brightness(0.9);                   transform: translateX(-1px); }
  100% { filter: grayscale(100%) contrast(1.6) brightness(0.85);                  transform: translateX(0); }
}



/* ── MOBILE ── */
@media (max-width: 768px) {
  .page { padding: 0 16px 0; }

}


/* ── IMAGE GLITCH — CSS only, zero CPU cost ── */
.cs-item img.fallback {

}
.cs-item.glitch-active img.fallback,

  animation: imgglitch 0.12s steps(1) infinite;
}
@keyframes imgglitch {
  0%   { filter: grayscale(100%) contrast(1.8) brightness(0.9);  transform: translateX(0);    }
  20%  { filter: grayscale(100%) contrast(2.2) brightness(1.15); transform: translateX(-4px); }
  40%  { filter: grayscale(80%)  contrast(1.5) brightness(0.75); transform: translateX(3px);  }
  60%  { filter: grayscale(100%) contrast(2.0) brightness(1.0);  transform: translateX(-2px); }
  80%  { filter: grayscale(90%)  contrast(1.7) brightness(0.85); transform: translateX(1px);  }
  100% { filter: grayscale(100%) contrast(1.8) brightness(0.9);  transform: translateX(0);    }
}

<script>
// ── LOAD IMAGES FROM JSON ────────────────────────────────
(function() {
  var lang = 'pt';
  try { lang = localStorage.getItem('ad-lang') || 'pt'; } catch(e) {}

  var _imgsData = [];

  fetch('imagens/imagens.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(imgs) {
      _imgsData = imgs;
      buildCarousel(imgs);
    })
    .catch(function(err) {
      console.warn('Could not load imagens.json:', err);
    });

  function buildCarousel(imgs) {
    var track = document.getElementById('csTrack');
    if (!track) return;

    var currentLang = 'pt';
    try { currentLang = localStorage.getItem('ad-lang') || 'pt'; } catch(e) {}

    // Build slides — original set + duplicate for infinite scroll
    function makeSlide(img, idx, isDupe) {
      var div = document.createElement('div');
      div.className = 'cs-item';
      if (!isDupe) div.id = 'csi' + idx;

      var im = document.createElement('img');
      im.className = 'fallback';
      im.src = 'imagens/' + img.arquivo;
      im.onerror = function() { console.warn('Could not load: imagens/' + img.arquivo); };
      im.alt = currentLang === 'en' ? img.legenda_en : img.legenda;
      div.appendChild(im);

      var cap = document.createElement('div');
      cap.className = 'cs-cap';
      cap.setAttribute('data-pt', img.legenda);
      cap.setAttribute('data-en', img.legenda_en);
      cap.textContent = currentLang === 'en' ? img.legenda_en : img.legenda;
      div.appendChild(cap);

      // Touch: toggle glitch-active class for CSS effect
      div.addEventListener('pointerdown', function(e) {
        if (e.pointerType === 'touch') div.classList.add('glitch-active');
      });
      div.addEventListener('pointerup',     function() { div.classList.remove('glitch-active'); });
      div.addEventListener('pointercancel', function() { div.classList.remove('glitch-active'); });

      return div;
    }

    imgs.forEach(function(img, i) { track.appendChild(makeSlide(img, i, false)); });
    imgs.forEach(function(img, i) { track.appendChild(makeSlide(img, i, true));  });

    // Init carousel scroll after slides are built
    initCarousel(imgs.length);


  }


  window.initCarousel = function(N) {
    var outer = document.getElementById('csOuter');
    var track = document.getElementById('csTrack');
    var prev  = document.getElementById('csPrev');
    var next  = document.getElementById('csNext');
    if (!outer || !track) return;

    var ITEM_W = 462, total = ITEM_W * N;
    var pos=0, drag=false, ds=0, ps=0, timer, auto=true;
    var rawPos = 0;
    var SPD = 0.5;

    function cl() { if(pos>=total) pos-=total; if(pos<0) pos+=total; }
    function rn() { track.style.transform = 'translateX(' + (-pos) + 'px)'; }
    function lp() { if(auto&&!drag) { pos+=SPD; cl(); rn(); } requestAnimationFrame(lp); }
    function sh(d) {
      auto=false; pos+=d*ITEM_W; cl(); rn();
      clearTimeout(timer); timer=setTimeout(function(){auto=true;},4000);
    }

    prev.onclick = function() { sh(-1); };
    next.onclick = function() { sh(1);  };

    outer.addEventListener('pointerdown', function(e) {
      drag=true; auto=false; ds=e.clientX; ps=pos; clearTimeout(timer);
      outer.setPointerCapture(e.pointerId);
    });
    outer.addEventListener('pointermove', function(e) {
      if (!drag) return;
      pos = ps - (e.clientX - ds); cl(); rn();
    });
    outer.addEventListener('pointerup', function() {
      drag=false; timer=setTimeout(function(){auto=true;},2000);
    });
    outer.addEventListener('pointercancel', function() {
      drag=false; timer=setTimeout(function(){auto=true;},2000);
    });

    lp();
  };
})();
</script>

<script>

// ═══════════════════════════════════════════════════════════
// 1. TITLE GLITCH — p5.glitch renders text as image, glitches
// ═══════════════════════════════════════════════════════════
new p5(function(sk) {
  let W, H, fn = 0;
  let mouseOver = false;
  let mouseXLocal = 0;
  let particles = [], textReady = false;

  function sampleText(W, fs, H) {
    const pg = sk.createGraphics(W, H);
    pg.background(0,0,0,0);
    pg.fill(255); pg.noStroke();
    pg.textFont('Arial Narrow, Arial');
    pg.textStyle(pg.NORMAL);
    pg.textSize(fs);
    pg.text('ANDRÉ DAMIÃO', 0, fs * 0.88);
    pg.loadPixels();
    const pix = pg.pixels, PW = pg.width, PH = pg.height;
    // Adaptive grid: smaller = more dots = better quality
    // On mobile (small W) use tighter grid so title doesn't look broken
    const GRID = 3; // uniform density — smaller dots on mobile instead
    const rows = {};
    for (let y = 0; y < PH; y += GRID) {
      for (let x = 0; x < PW; x += GRID) {
        const i = (y * PW + x) * 4;
        if (pix[i+3] > 60) {
          const ry = Math.floor(y/GRID);
          if (!rows[ry]) rows[ry] = { y, pts: [] };
          rows[ry].pts.push({ ox: x, oy: y });
        }
      }
    }
    pg.remove();
    let si = 0;
    Object.values(rows).forEach(function(row) {
      if (row.pts.length < 2) return;
      const type = si % 5;
      const xMin = row.pts[0].ox;
      const xMax = row.pts[row.pts.length-1].ox;
      const span = xMax - xMin || 1;
      const freq = 0.6 + (span/W) * 3.5;
      particles.push({
        y: row.y, xMin, xMax, span, type, freq,
        phase:  Math.random() * Math.PI * 2,
        scroll: Math.random(),
        speed:  0.0003 + Math.random() * 0.0005,
        noise:  (type===3) ? makeNoise(120) : null,
        dots: row.pts.map(p => ({
          ox: p.ox, oy: p.oy,
          t: (p.ox - xMin) / span,
          amp: 0, ampTarget: 0
        }))
      });
      si++;
    });
    textReady = true;
    sk.loop();
    }

  function waveVal(type, t, scroll, freq, phase, amp, noise) {
    const x = (t * freq + scroll) % 1;
    const a = x * Math.PI * 2 + phase;
    switch(type) {
      case 0: return amp * Math.sin(a);
      case 1: return amp * Math.max(-1, Math.min(1, Math.sin(a) * 3.5));
      case 2: return amp * (2 * (x % 1) - 1);
      case 3: {
        if (!noise) return 0;
        const pos = ((x + 1) % 1) * (noise.length - 1);
        const i0  = Math.floor(pos) % noise.length;
        const i1  = (i0 + 1) % noise.length;
        return amp * (noise[i0] * (1-(pos%1)) + noise[i1] * (pos%1));
      }
      case 4: {
        const p = ((x%1)+1)%1;
        return amp * (p < 0.08 ? 1 : p < 0.16 ? -0.3 : 0);
      }
    }
    return 0;
  }

  function makeNoise(npts) {
    const freqs  = [1.3, 2.7, 5.1, 8.9];
    const phases = freqs.map(() => Math.random() * Math.PI * 2);
    const amps   = [0.45, 0.28, 0.17, 0.10];
    const arr = [];
    for (let k = 0; k <= npts; k++) {
      const t = k / npts;
      let v = 0;
      freqs.forEach((f, i) => { v += amps[i] * Math.sin(t * Math.PI * 2 * f + phases[i]); });
      arr.push(v);
    }
    return arr;
  }

  sk.setup = function() {
    const header = document.getElementById('siteHeader');
    const nameEl = document.getElementById('sname');
    W = header.offsetWidth || 800;
    const fs = Math.min(92, Math.max(28, W * 0.09));
    H = Math.round(fs * 1.5); // extra headroom for descenders

    let cnv = sk.createCanvas(W, H);
    cnv.elt.id = 'title-canvas';
    cnv.elt.style.cssText = 'position:absolute;top:32px;left:0;pointer-events:none;z-index:3;';
    header.insertBefore(cnv.elt, header.firstChild);
    nameEl.style.visibility = 'hidden';

    sk.pixelDensity(1);
    sk.frameRate(15);
    sk.noLoop();



    sampleText(W, fs, H);

    // Unified input — mouse hover + touch continuous tracking
    header.style.touchAction = 'none';

    function titleMove(e) {
      mouseOver = true; decompTarget = 1;
      const rect = header.getBoundingClientRect();
      mouseXLocal = e.clientX - rect.left;
      particles.forEach(s => { s.ampTarget = 16 + Math.random() * 8; });
    }
    function titleEnd() {
      mouseOver = false; decompTarget = 0;
      particles.forEach(s => s.dots.forEach(d => { d.ampTarget = 0; }));
    }

    // Mouse hover — no click needed
    header.addEventListener('pointermove', titleMove);
    header.addEventListener('pointerleave', titleEnd);

    // Touch — capture and track continuously
    header.addEventListener('pointerdown', function(e) {
      if (e.pointerType === 'touch') {
        header.setPointerCapture(e.pointerId);
        titleMove(e);
      }
    });
    header.addEventListener('pointerup',     function(e) { if (e.pointerType === 'touch') titleEnd(); });
    header.addEventListener('pointercancel', titleEnd);
  };

  sk.draw = function() {
    if (!textReady) return;
    fn++;
    sk.clear();
    sk.noStroke();

    // Influence radius: dots within ~120px of mouse get full amp
    const RADIUS = W < 600 ? W * 0.25 : 160; // proportional radius
    const MAX_AMP = 16;

    for (const strand of particles) {
      strand.scroll = (strand.scroll + strand.speed) % 1;

      // Update per-dot ampTarget based on distance to mouse X
      strand.dots.forEach(function(dot) {
        if (mouseOver) {
          const dist = Math.abs(dot.ox - mouseXLocal);
          const inf  = Math.max(0, 1 - dist / RADIUS);
          dot.ampTarget = inf * MAX_AMP;
        } else {
          dot.ampTarget = 0;
        }
        // faster spring for snappier response
        dot.amp += (dot.ampTarget - dot.amp) * 0.12;
      });

      sk.fill(240, 237, 230);
      const DOT = W < 600 ? 1.5 : 2; // smaller on mobile so dots don't overlap
      for (const dot of strand.dots) {
        if (dot.amp < 0.05) {
          sk.rect(dot.ox, dot.oy, DOT, DOT);
        } else {
          const dy = waveVal(strand.type, dot.t, strand.scroll, strand.freq, strand.phase, dot.amp, strand.noise);
          sk.rect(dot.ox, dot.oy - dy, DOT, DOT);
        }
      }
      // Push title warp level to global background effect
      let titleMaxWarp = 0;
      for (const strand of particles) {
        for (const dot of strand.dots) {
          if (dot.amp > titleMaxWarp) titleMaxWarp = dot.amp;
        }
      }
      window._sonoWarp = Math.max(window._sonoWarp || 0, Math.min(1, titleMaxWarp / 14));
    }
  };

  sk.windowResized = function() {
    const header = document.getElementById('siteHeader');
    if (!header) return;
    W = header.offsetWidth;
    const newFs = Math.min(92, Math.max(22, W * 0.09));
    const newH  = Math.round(newFs * 1.5);
    sk.resizeCanvas(W, newH);
    // Clear and re-sample at new resolution
    particles  = [];
    textReady  = false;
    mouseOver  = false;
    sampleText(W, newFs, newH);
  };
});

function makeSono(id, specs) {
  new p5(function(sk) {
    let W, H, fn = 0;
    let mouseOver = false, mouseXL = 0, mouseYL = 0, rawX = 0, rawY = 0;
    let strands = [];

  function waveVal(type, t, scroll, freq, phase, amp, noise) {
    const x = (t * freq + scroll) % 1;
    const a = x * Math.PI * 2 + phase;
    switch(type) {
      case 0: return amp * Math.sin(a);
      case 1: return amp * Math.max(-1, Math.min(1, Math.sin(a) * 3.5));
      case 2: return amp * (2 * (x % 1) - 1);
      case 3: {
        if (!noise) return 0;
        const pos = ((x + 1) % 1) * (noise.length - 1);
        const i0  = Math.floor(pos) % noise.length;
        const i1  = (i0 + 1) % noise.length;
        return amp * (noise[i0] * (1-(pos%1)) + noise[i1] * (pos%1));
      }
      case 4: {
        const p = ((x%1)+1)%1;
        return amp * (p < 0.08 ? 1 : p < 0.16 ? -0.3 : 0);
      }
    }
    return 0;
  }

  function makeNoise(npts) {
    const freqs  = [1.3, 2.7, 5.1, 8.9];
    const phases = freqs.map(() => Math.random() * Math.PI * 2);
    const amps   = [0.45, 0.28, 0.17, 0.10];
    const arr = [];
    for (let k = 0; k <= npts; k++) {
      const t = k / npts;
      let v = 0;
      freqs.forEach((f, i) => { v += amps[i] * Math.sin(t * Math.PI * 2 * f + phases[i]); });
      arr.push(v);
    }
    return arr;
  }

    sk.setup = function() {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      // Use actual layout width — fallback if not yet painted
      W = wrap.getBoundingClientRect().width || wrap.offsetWidth || 828;
      H = wrap.offsetHeight || 50;
      if (W < 10) W = window.innerWidth - 72 || 828; // mobile fallback
      const cnv = sk.createCanvas(W, H);
      cnv.parent(id);
      sk.pixelDensity(1);
      sk.frameRate(12);

      const DOT = 2, GAP = 1, STEP = DOT + GAP;

      strands = specs.map(function(s, i) {
        const x0px = Math.round(s.x0 * W);
        const x1px = Math.round(s.x1 * W);
        const yPx  = Math.round(s.y  * H);
        const hPx  = Math.max(DOT, Math.round(s.h * H));
        const type  = i % 5;
        const span  = x1px - x0px || 1;
        const len   = s.x1 - s.x0;
        const base  = 0.35 + (1-len)*1.4 + (1-s.h)*0.5;
        const freq  = 0.7 + len * 3.0;
        const noise = (type===3) ? makeNoise(120) : null;

        const dots = [];
        for (let x = x0px; x <= x1px - DOT; x += STEP) {
          dots.push({ ox: x, oy: yPx, t: (x-x0px)/span, amp: 0, ampTarget: 0 });
          if (hPx >= DOT*2+GAP)
            dots.push({ ox: x, oy: yPx+DOT+GAP, t: (x-x0px)/span, amp: 0, ampTarget: 0 });
        }

        return {
          x0: x0px, x1: x1px, y: yPx, span, type, freq,
          phase:  Math.random() * Math.PI * 2,
          scroll: Math.random(),
          speed:  base * (0.6 + Math.random()*0.8) * 0.003, // slower
          noise, a: s.a || 255, dots
        };
      });

      // Unified input — mouse hover + touch continuous tracking
      cnv.elt.style.touchAction = 'none';

      function sonoMove(clientX, clientY) {
        const rect = cnv.elt.getBoundingClientRect();
        rawX = clientX - rect.left;
        rawY = clientY - rect.top;
        mouseOver = true;
      }
      function sonoEnd() {
        mouseOver = false;
        strands.forEach(st => st.dots.forEach(d => { d.ampTarget = 0; }));
      }

      // Mouse: pointermove covers hover (no click needed)
      cnv.elt.addEventListener('pointermove', function(e) {
        sonoMove(e.clientX, e.clientY);
      });
      cnv.elt.addEventListener('pointerleave', sonoEnd);

      // Touch: capture + track continuously
      cnv.elt.addEventListener('pointerdown', function(e) {
        if (e.pointerType === 'touch') {
          cnv.elt.setPointerCapture(e.pointerId);
          sonoMove(e.clientX, e.clientY);
        }
      });
      cnv.elt.addEventListener('pointerup',     function(e) { if (e.pointerType === 'touch') sonoEnd(); });
      cnv.elt.addEventListener('pointercancel', sonoEnd);
    };

    sk.draw = function() {
      fn++;
      sk.background(8);
      sk.noStroke();

      // Lerp mouse position for smoother touch tracking
      mouseXL += (rawX - mouseXL) * 0.18;
      mouseYL += (rawY - mouseYL) * 0.18;

      // Radius of influence in px — narrow, follows mouse closely
      const RADIUS_X = W * 0.12; // ~12% of width
      const RADIUS_Y = H * 1.2;  // generous vertically (small canvas)
      const MAX_AMP  = 10;

      for (const st of strands) {
        st.scroll = (st.scroll + st.speed) % 1;

        // per-dot amplitude driven by 2D proximity to mouse
        const distY = Math.abs(mouseYL - (st.y + 1));
        const infY  = mouseOver ? Math.max(0, 1 - distY / RADIUS_Y) : 0;

        st.dots.forEach(function(dot) {
          if (mouseOver && infY > 0) {
            const distX = Math.abs(mouseXL - dot.ox);
            const infX  = Math.max(0, 1 - distX / RADIUS_X);
            dot.ampTarget = infX * infY * MAX_AMP;
          } else {
            dot.ampTarget = 0;
          }
          dot.amp += (dot.ampTarget - dot.amp) * 0.12;
        });

        sk.fill(240, 237, 230, st.a);
        const DOT = 2;
        for (const dot of st.dots) {
          const scrollPx = st.scroll * st.span;
          const wrappedX = st.x0 + ((dot.ox + scrollPx - st.x0) % st.span + st.span) % st.span;
          if (dot.amp < 0.05) {
            sk.rect(wrappedX, dot.oy, DOT, DOT);
          } else {
            const dy = waveVal(st.type, dot.t, st.scroll, st.freq, st.phase, dot.amp, st.noise);
            sk.rect(wrappedX, dot.oy - dy, DOT, DOT);
          }
        }
      }
      // Update global warp level for background effect
      let maxWarp = 0;
      for (const st of strands) {
        for (const dot of st.dots) {
          if (dot.amp > maxWarp) maxWarp = dot.amp;
        }
      }
      // Normalise 0-1 and push to global tracker
      const norm = Math.min(1, maxWarp / 10);
      window._sonoWarp = Math.max(window._sonoWarp || 0, norm);
    };

    sk.windowResized = function() {
      const wrap = document.getElementById(id);
      if (!wrap) return;
      W = wrap.offsetWidth;
      sk.resizeCanvas(W, H);
    };
  });
}
makeSono('sono1', [
  {y:0.00,h:0.14,x0:0,x1:1,a:255},
  {y:0.18,h:0.02,x0:0,x1:1,a:255},

  {y:0.66,h:0.04,x0:0,x1:1,a:255},
  {y:0.78,h:0.04,x0:0,x1:0.75,a:255},
  {y:0.88,h:0.06,x0:0,x1:1,a:255},

]);

function setLang(lang) {
  document.getElementById('btn-pt').classList.toggle('active', lang === 'pt');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.querySelectorAll('[data-pt][data-en]').forEach(function(el) {
    el.innerHTML = el.getAttribute('data-' + lang);
  });
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
  try { localStorage.setItem('ad-lang', lang); } catch(e) {}
}
// restore saved preference
(function() {
  try { var s = localStorage.getItem('ad-lang'); if (s === 'en') setLang('en'); } catch(e) {}
})();
</script>

<script>
// ── BACKGROUND GRADIENT FROM SONO WARP ──────────────────
(function() {
  window._sonoWarp = 0;
  var currentBg = 0; // 0 = black, 1 = dark grey

  function lerp(a, b, t) { return a + (b - a) * t; }

  var pulsePhase = 0;

  function tick() {
    var target = window._sonoWarp || 0;
    // Fast rise, moderate decay
    currentBg += (target - currentBg) * (target > currentBg ? 0.12 : 0.03);
    // Fast warp decay
    window._sonoWarp = (window._sonoWarp || 0) * 0.92;

    // Pulse: add sine oscillation when active
    pulsePhase += 0.08;
    var pulse = currentBg > 0.05 ? currentBg * 0.35 * Math.abs(Math.sin(pulsePhase)) : 0;
    var total = Math.min(1, currentBg + pulse);

    // Map 0→1 to #080808 → #888888 (much lighter ceiling)
    var v = Math.round(lerp(8, 68, total));
    var hex = v.toString(16).padStart(2,'0');
    document.body.style.backgroundColor = '#' + hex + hex + hex;

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
